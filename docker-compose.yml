services:
  db:
    image: postgres:16-alpine
    container_name: logia-db
    environment:
      POSTGRES_USER: logia
      POSTGRES_PASSWORD: logia
      POSTGRES_DB: logia
    ports:
      - "5432:5432"
    volumes:
      - logia-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U logia"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: logia-redis
    ports:
      - "6379:6379"

volumes:
  logia-pgdata:
